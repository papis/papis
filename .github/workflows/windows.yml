name: Build Windows release

on:
  push:
    tags: ["v.*"]
    branches:
      - main
      - "*windows*"
  pull_request:
      branches: [ "main" ]

jobs:
  build-windows-release:
    runs-on: windows-latest
    strategy:
      fail-fast: true

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set version in pyproject.toml, papis.wxs and environment
      shell: bash
      run: |
        set -x
        version=$(
            git describe --tags --dirty \
            | sed -e 's/^v//' -e 's/\([^-]*-g\)/dev\1/;s/-g.*//g'
          )
        echo "PAPIS_VERSION=$version" >> "$GITHUB_ENV"
        sed -i \
          "s/^version =\".*\"/version =\"${version}\"/" \
          pyproject.toml
        msi_version=$(
            git describe --tags --dirty \
            | sed -e 's/^v//' -e 's/-\([^-]*-g\)/.\1/;s/-g.*//g'
          )
        sed -i "s/Version=\".*\"/Version=\"${msi_version}\"/" \
          scripts/windows/papis.wxs

    - name: Install dependencies
      run: make ci-install && pip install '.[windows]'
      shell: bash

    - name: Build Windows binary
      run: |
        pyinstaller --clean scripts/windows/papis.spec

    - name: Publish binary as artifact
      uses: actions/upload-artifact@v4
      with:
        name: papis-${{env.PAPIS_VERSION}}.exe
        path: ${{ github.workspace }}/dist/papis.exe

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install WiX
      run: dotnet tool install --global wix --version 4.0.5

    - name: Install the UI extension
      run: wix extension -g add WixToolset.UI.wixext/4.0.5

    - name: Build the installer
      run: wix build -ext WixToolset.UI.wixext -o dist/papis.msi .\scripts\windows\papis.wxs

    - name: Publish installer as artifact
      uses: actions/upload-artifact@v4
      with:
        name: papis-${{env.PAPIS_VERSION}}.msi
        path: ${{ github.workspace }}/dist/papis.msi
